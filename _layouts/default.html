<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}Ícaro Niz</title>
  <meta name="description" content="Senior Frontend Engineer and Technical Lead with 10+ years of experience building web applications and leading frontend teams." />
  <link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" /></noscript>
  <link rel="icon" href="{{ '/assets/img/favicon.ico' | relative_url }}" type="image/x-icon" />
  <style>
    :root{--clr-dark:#131816;--clr-dark-deep:#0d120f;--clr-surface:#f5f5f3;--clr-white:#fff;--clr-green-top:#9CE907;--clr-green-bot:#00E8A3;--clr-muted:#61736D;--clr-text:#1a1a1a;--clr-body:#444;--clr-subtle:#555;--clr-border:#e5e5e5;--clr-border-mid:#e0e0e0;--gradient:linear-gradient(180deg,var(--clr-green-top) 0%,var(--clr-green-bot) 100%);--gradient-text:linear-gradient(180deg,var(--clr-green-top) 0%,var(--clr-green-bot) 100%);--radius-sm:4px;--radius:6px;--radius-md:8px;--radius-lg:10px;--font-sans:'Inter','Helvetica Neue',Arial,sans-serif;--space-section:56px;--max-w:860px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-sans);font-size:15px;line-height:1.6;color:var(--clr-text);background:var(--clr-white);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:inherit}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 28px}
    .site-nav{position:sticky;top:0;z-index:100;background:var(--clr-dark);border-bottom:1px solid rgba(255,255,255,.07);height:56px;display:flex;align-items:center}
    .site-nav .container{display:flex;align-items:center;justify-content:space-between;width:100%}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-brand svg{display:block}
    .nav-wordmark{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--clr-muted)}
    .nav-links{display:flex;list-style:none;gap:28px}
    .nav-links a{font-size:13px;color:var(--clr-muted)}
    .nav-right{display:flex;align-items:center;gap:12px}
    .lang-toggle{display:flex;background:rgba(97,115,109,.12);border-radius:var(--radius-sm);overflow:hidden}
    .lang-btn{font-size:11px;font-weight:500;padding:5px 10px;color:var(--clr-muted);background:transparent;border:none;letter-spacing:.5px}
    .lang-btn.is-active{background:rgba(156,233,7,.15);color:var(--clr-green-top)}
    .nav-contact{font-size:12px;padding:6px 16px;border-radius:var(--radius);border:1px solid rgba(156,233,7,.45);color:var(--clr-green-top);background:transparent}
    .hero{background:var(--clr-dark);padding:80px 0 88px;position:relative;overflow:hidden}
    .hero::after{content:'';position:absolute;bottom:-80px;left:35%;width:520px;height:240px;background:radial-gradient(ellipse at center,rgba(0,232,163,.14) 0%,rgba(156,233,7,.06) 40%,transparent 70%);pointer-events:none}
    .hero-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--clr-green-top);margin-bottom:18px}
    .hero-title{font-size:52px;font-weight:800;line-height:1.05;color:#fff;margin-bottom:20px;max-width:620px;letter-spacing:-1px}
    .hero-title em{font-style:normal;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-body{font-size:16px;color:var(--clr-muted);line-height:1.75;max-width:520px;margin-bottom:36px}
    .hero-cta{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:var(--radius);background:var(--gradient);color:var(--clr-dark);font-size:14px;font-weight:700;border:none;letter-spacing:.2px}
    .hero-cta svg{width:14px;height:14px;stroke:var(--clr-dark);fill:none;stroke-width:2.5}
    .hero-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:44px}
    .chip{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid rgba(97,115,109,.35);color:var(--clr-muted)}
    @media(max-width:700px){.nav-links{display:none}.hero-title{font-size:36px}}
    @media(max-width:420px){.hero-title{font-size:30px}}
  </style>
</head>
<body>
  {{ content }}
  <script src="{{ '/assets/js/i18n.js' | relative_url }}" defer></script>
</body>
</html>
